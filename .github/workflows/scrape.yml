name: Tender Scrapers

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Dependencies installeren
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Verkennen (TIJDELIJK)
        env:
          FREELANCE_EMAIL: ${{ secrets.FREELANCE_EMAIL }}
          FREELANCE_WACHTWOORD: ${{ secrets.FREELANCE_WACHTWOORD }}
          RET_EMAIL: ${{ secrets.RET_EMAIL }}
          RET_WACHTWOORD: ${{ secrets.RET_WACHTWOORD }}
          STEDINVMS_EMAIL: ${{ secrets.STEDINVMS_EMAIL }}
          STEDINVMS_WACHTWOORD: ${{ secrets.STEDINVMS_WACHTWOORD }}
          FREELANCE_DEBUG: "1"
        run: python verken.py
      - name: Debug-screenshots uploaden
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: debug_*.png
          if-no-files-found: ignore
