name: Tender Scrapers

on:
  schedule:
    - cron: '0 6,12 * * *'   # 06:00 en 12:00 UTC (zomertijd NL: 08:00 en 14:00)
  workflow_dispatch:

# Nooit twee runs tegelijk, anders vechten ze om tenders.db
concurrency:
  group: scrapers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Dependencies installeren
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Scrapers draaien
        env:
          MERCELL_EMAIL: ${{ secrets.MERCELL_EMAIL }}
          MERCELL_WACHTWOORD: ${{ secrets.MERCELL_WACHTWOORD }}
          STRIIVE_EMAIL: ${{ secrets.STRIIVE_EMAIL }}
          STRIIVE_WACHTWOORD: ${{ secrets.STRIIVE_WACHTWOORD }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
        run: python run.py

      - name: CSV, dashboard en debug uploaden
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenders
          path: |
            tenders.csv
            tenders_nieuw.csv
            dashboard.html
            debug_*.png
          if-no-files-found: ignore

      - name: Database terugcommitten
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenders.db
          git diff --staged --quiet && echo "geen wijzigingen" && exit 0
          git commit -m "Tenders bijgewerkt $(date -u +%F)"
          git pull --rebase --autostash
          git push
