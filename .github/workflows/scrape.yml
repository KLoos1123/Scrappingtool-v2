name: Tender Scrapers

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Dependencies installeren
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Verkennen (TIJDELIJK)
        env:
          MAGNIT_EMAIL: ${{ secrets.MAGNIT_EMAIL }}
          MAGNIT_WACHTWOORD: ${{ secrets.MAGNIT_WACHTWOORD }}
        run: python verken.py
      - name: Debug-screenshots uploaden
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: debug_*.png
          if-no-files-found: ignore
